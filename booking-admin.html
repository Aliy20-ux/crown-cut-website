<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Barber Admin — Crown Cut Edinburgh</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0A0A0A;--bg2:#111111;--bg3:#191919;--bg4:#1E1E1E;
  --border:#222222;--border2:#2E2E2E;
  --text:#E8E8E4;--text2:#888888;--text3:#555555;
  --white:#F6F6F2;--g100:#DDDDD8;--g200:#ABABAB;
  --green:#2ECC71;--amber:#F39C12;--red:#E74C3C;
  --fd:'Bebas Neue',sans-serif;
  --fb:'Inter',system-ui,sans-serif;
  --fm:'DM Mono','Courier New',monospace;
}
html{font-size:16px}
body{background:var(--bg);color:var(--text);font-family:var(--fb);font-weight:300;overflow-x:hidden;-webkit-font-smoothing:antialiased;min-height:100vh}

/* LOGIN */
#login-screen{position:fixed;inset:0;background:var(--bg);z-index:200;display:flex;align-items:center;justify-content:center;padding:2rem}
#login-screen.hidden{display:none}
.login-card{width:100%;max-width:420px;background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:3rem}
.login-logo{width:64px;height:64px;border-radius:50%;object-fit:cover;display:block;margin:0 auto 2rem}
.login-title{font-family:var(--fd);font-size:2.2rem;color:var(--white);letter-spacing:.04em;text-align:center;margin-bottom:.4rem}
.login-sub{font-family:var(--fm);font-size:.55rem;letter-spacing:.3em;color:var(--text3);text-transform:uppercase;text-align:center;margin-bottom:2.5rem}
.login-field{margin-bottom:1.2rem}
.login-field label{font-family:var(--fm);font-size:.55rem;letter-spacing:.25em;text-transform:uppercase;color:var(--text3);display:block;margin-bottom:.6rem}
.login-field select,.login-field input{width:100%;background:var(--bg3);border:1px solid var(--border2);color:var(--text);font-family:var(--fb);font-size:.9rem;padding:.9rem 1.1rem;border-radius:8px;outline:none;transition:border-color .2s;appearance:none;-webkit-appearance:none}
.login-field select:focus,.login-field input:focus{border-color:rgba(246,246,242,.3)}
.login-btn{width:100%;background:var(--white);color:var(--bg);font-family:var(--fm);font-size:.65rem;letter-spacing:.22em;text-transform:uppercase;border:none;padding:1.1rem;border-radius:8px;cursor:pointer;margin-top:.8rem;transition:background .2s,transform .2s}
.login-btn:hover{background:var(--g100);transform:translateY(-1px)}
.login-error{font-family:var(--fm);font-size:.6rem;letter-spacing:.15em;color:var(--red);text-align:center;margin-top:1rem;min-height:1.2rem}

/* ADMIN LAYOUT */
#admin-screen{display:none}
#admin-screen.visible{display:block}
.admin-header{position:sticky;top:0;z-index:50;background:rgba(10,10,10,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:1.2rem 2.5rem;display:flex;align-items:center;justify-content:space-between;gap:1rem}
.admin-header-left{display:flex;align-items:center;gap:1.5rem}
.admin-logo{width:36px;height:36px;border-radius:50%;object-fit:cover}
.admin-title{font-family:var(--fd);font-size:1.4rem;color:var(--white);letter-spacing:.04em}
.admin-barber-badge{font-family:var(--fm);font-size:.52rem;letter-spacing:.2em;text-transform:uppercase;color:var(--bg);background:var(--white);padding:.25rem .7rem;border-radius:3px}
.admin-logout{font-family:var(--fm);font-size:.55rem;letter-spacing:.2em;text-transform:uppercase;color:var(--text3);background:none;border:1px solid var(--border);padding:.5rem 1.1rem;border-radius:6px;cursor:pointer;transition:color .2s,border-color .2s}
.admin-logout:hover{color:var(--white);border-color:var(--border2)}
.admin-body{padding:2.5rem}

/* Stats */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:2.5rem}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:1.5rem 1.8rem}
.stat-label{font-family:var(--fm);font-size:.52rem;letter-spacing:.25em;text-transform:uppercase;color:var(--text3);margin-bottom:.6rem}
.stat-value{font-family:var(--fd);font-size:2.4rem;color:var(--white);letter-spacing:.03em;line-height:1}
.stat-sub{font-family:var(--fm);font-size:.5rem;letter-spacing:.15em;color:var(--text3);margin-top:.4rem;text-transform:uppercase}
.stat-card.green .stat-value{color:var(--green)}
.stat-card.amber .stat-value{color:var(--amber)}

/* Filters */
.filter-row{display:flex;align-items:center;justify-content:space-between;gap:1rem;margin-bottom:1.5rem;flex-wrap:wrap}
.filter-tabs{display:flex;gap:.5rem}
.filter-tab{font-family:var(--fm);font-size:.55rem;letter-spacing:.2em;text-transform:uppercase;background:none;border:1px solid var(--border);color:var(--text3);padding:.6rem 1.3rem;border-radius:6px;cursor:pointer;transition:all .2s}
.filter-tab.active,.filter-tab:hover{border-color:var(--white);color:var(--white);background:rgba(246,246,242,.06)}
.admin-date{font-family:var(--fm);font-size:.55rem;letter-spacing:.2em;text-transform:uppercase;color:var(--text3)}

/* Table */
.bookings-table-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.bookings-table{width:100%;border-collapse:collapse}
.bookings-table th{font-family:var(--fm);font-size:.5rem;letter-spacing:.28em;text-transform:uppercase;color:var(--text3);padding:1rem 1.5rem;text-align:left;border-bottom:1px solid var(--border);background:var(--bg3)}
.bookings-table td{padding:1.1rem 1.5rem;border-bottom:1px solid var(--border);vertical-align:middle}
.bookings-table tr:last-child td{border-bottom:none}
.bookings-table tr:hover td{background:rgba(255,255,255,.02)}
.td-time{font-family:var(--fm);font-size:.75rem;color:var(--white);white-space:nowrap}
.td-name{font-size:.9rem;color:var(--text);font-weight:400}
.td-service{font-size:.82rem;color:var(--text2)}
.td-price{font-family:var(--fd);font-size:1.4rem;color:var(--white);letter-spacing:.03em;white-space:nowrap}
.td-status span{font-family:var(--fm);font-size:.48rem;letter-spacing:.18em;text-transform:uppercase;padding:.25rem .65rem;border-radius:4px}
.status-confirmed{background:rgba(46,204,113,.15);color:var(--green)}
.status-pending{background:rgba(243,156,18,.15);color:var(--amber)}
.status-done{background:rgba(246,246,242,.08);color:var(--text3)}
.empty-state{padding:4rem;text-align:center}
.empty-icon{font-size:2.5rem;margin-bottom:1rem;opacity:.3}
.empty-text{font-family:var(--fm);font-size:.6rem;letter-spacing:.25em;text-transform:uppercase;color:var(--text3)}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--border2);border-top-color:var(--white);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:900px){
  .stats-row{grid-template-columns:1fr 1fr}
  .admin-body{padding:1.5rem}
  .bookings-table th:nth-child(4),.bookings-table td:nth-child(4){display:none}
}
@media(max-width:600px){
  .admin-header{padding:1rem 1.5rem}
  .admin-body{padding:1rem}
  .bookings-table th:nth-child(n+5),.bookings-table td:nth-child(n+5){display:none}
}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="login-card">
    <img src="images/logo.svg" alt="Crown Cut" class="login-logo">
    <div class="login-title">Barber Portal</div>
    <div class="login-sub">Crown Cut Edinburgh</div>
    <div class="login-field">
      <label>Select Barber</label>
      <select id="login-barber">
        <option value="">— Choose your name —</option>
        <option value="kate">Kate</option>
        <option value="dilman">Dilman</option>
      </select>
    </div>
    <div class="login-field">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="Enter password" autocomplete="current-password">
    </div>
    <button class="login-btn" onclick="attemptLogin()">Sign In →</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- ADMIN DASHBOARD -->
<div id="admin-screen">
  <header class="admin-header">
    <div class="admin-header-left">
      <img src="images/logo.svg" alt="" class="admin-logo">
      <div class="admin-title">Crown Cut</div>
      <span class="admin-barber-badge" id="barber-badge">—</span>
    </div>
    <div style="display:flex;align-items:center;gap:1rem">
      <span class="admin-date" id="today-label"></span>
      <button class="admin-logout" onclick="logout()">Sign Out</button>
    </div>
  </header>

  <div class="admin-body">
    <div class="stats-row">
      <div class="stat-card green">
        <div class="stat-label">Today's Bookings</div>
        <div class="stat-value" id="stat-today">—</div>
        <div class="stat-sub">Appointments</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">This Week</div>
        <div class="stat-value" id="stat-week">—</div>
        <div class="stat-sub">Appointments</div>
      </div>
      <div class="stat-card amber">
        <div class="stat-label">Today's Revenue</div>
        <div class="stat-value" id="stat-revenue">—</div>
        <div class="stat-sub">Estimated</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Week Revenue</div>
        <div class="stat-value" id="stat-week-rev">—</div>
        <div class="stat-sub">Estimated</div>
      </div>
    </div>

    <div class="filter-row">
      <div class="filter-tabs">
        <button class="filter-tab active" onclick="setFilter('upcoming',this)">Upcoming</button>
        <button class="filter-tab" onclick="setFilter('today',this)">Today</button>
        <button class="filter-tab" onclick="setFilter('past',this)">Past</button>
        <button class="filter-tab" onclick="setFilter('all',this)">All</button>
      </div>
      <span class="admin-date" id="filter-count"></span>
    </div>

    <div class="bookings-table-wrap">
      <table class="bookings-table">
        <thead>
          <tr>
            <th>Date &amp; Time</th>
            <th>Client</th>
            <th>Service</th>
            <th>Duration</th>
            <th>Price</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="bookings-tbody">
          <tr><td colspan="6" style="padding:3rem;text-align:center"><div class="spinner"></div></td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
var API = 'https://crown-cut-booking-api.aliy20.workers.dev';
var PASSWORDS = { kate: 'CrownCut2025!', dilman: 'CrownCut2025!' };
var currentBarber = null;
var allBookings = [];
var currentFilter = 'upcoming';

function attemptLogin() {
  var barber = document.getElementById('login-barber').value;
  var pass = document.getElementById('login-password').value;
  var err = document.getElementById('login-error');
  if (!barber) { err.textContent = 'Please select your name.'; return; }
  if (!pass) { err.textContent = 'Please enter your password.'; return; }
  if (PASSWORDS[barber] !== pass) { err.textContent = 'Incorrect password. Try again.'; return; }
  err.textContent = '';
  currentBarber = barber;
  var cap = barber.charAt(0).toUpperCase() + barber.slice(1);
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('admin-screen').classList.add('visible');
  document.getElementById('barber-badge').textContent = cap;
  document.getElementById('today-label').textContent = new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'});
  loadBookings();
}

document.getElementById('login-password').addEventListener('keydown', function(e){
  if (e.key === 'Enter') attemptLogin();
});

function logout() {
  currentBarber = null; allBookings = [];
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('admin-screen').classList.remove('visible');
  document.getElementById('login-password').value = '';
  document.getElementById('login-barber').value = '';
}

async function loadBookings() {
  try {
    var res = await fetch(API + '/admin/bookings', {
      headers: { 'Authorization': 'Bearer ' + PASSWORDS[currentBarber] }
    });
    if (!res.ok) throw new Error('status ' + res.status);
    var data = await res.json();
    var raw = data.bookings || data || [];
    allBookings = raw.filter(function(b) {
      return !b.barber || b.barber.toLowerCase() === currentBarber.toLowerCase();
    });
  } catch(e) {
    allBookings = makeDemoData();
  }
  renderStats();
  renderTable();
}

function makeDemoData() {
  var now = new Date();
  var svcs = currentBarber === 'dilman'
    ? [['Skin Fade',25,30],['Standard Haircut',23,25],['Skin Fade & Beard (Fade+Shape)',42,60],['Haircut & Hot Shave',44,60],['Scissor Cut',25,30]]
    : [['Skin Fade',23,30],['Standard Haircut',21,30],['Skin Fade & Beard (Fade+Shape)',40,60],['Haircut & Hot Shave',40,60],['Beard Trim & Shape',15,20]];
  var names = ['James M.','Ryan T.','Connor A.','Liam S.','Dylan B.','Ethan W.','Noah P.','Jack H.','Oliver K.','Marcus R.','Aaron J.','Finn C.'];
  var out = [];
  var slots = [[9,0],[9,30],[10,0],[10,30],[11,0],[11,30],[12,30],[13,0],[14,0],[14,30],[15,0],[15,30],[16,0],[17,0]];
  for (var i = 0; i < slots.length; i++) {
    var d = new Date(now);
    d.setDate(d.getDate() + (i < 5 ? 0 : i < 9 ? 1 : 2));
    d.setHours(slots[i][0], slots[i][1], 0, 0);
    var s = svcs[i % svcs.length];
    out.push({ id: i+1, datetime: d.toISOString(), client_name: names[i % names.length], service: s[0], price: s[1], duration: s[2], status: i < 3 ? 'done' : 'confirmed' });
  }
  for (var j = 0; j < 4; j++) {
    var pd = new Date(now); pd.setDate(pd.getDate() - (j+1)); pd.setHours(11+j,0,0,0);
    var ps = svcs[j % svcs.length];
    out.push({ id: 100+j, datetime: pd.toISOString(), client_name: names[(j+8) % names.length], service: ps[0], price: ps[1], duration: ps[2], status: 'done' });
  }
  return out;
}

function renderStats() {
  var now = new Date();
  var todayStr = now.toISOString().split('T')[0];
  var weekAgo = new Date(now); weekAgo.setDate(now.getDate() - 7);
  var todayB = allBookings.filter(function(b){ return b.datetime && b.datetime.startsWith(todayStr); });
  var weekB = allBookings.filter(function(b){ if(!b.datetime) return false; var d=new Date(b.datetime); return d>=weekAgo && d<=now; });
  document.getElementById('stat-today').textContent = todayB.length;
  document.getElementById('stat-week').textContent = weekB.length;
  document.getElementById('stat-revenue').textContent = '£'+todayB.reduce(function(s,b){return s+(b.price||0);},0);
  document.getElementById('stat-week-rev').textContent = '£'+weekB.reduce(function(s,b){return s+(b.price||0);},0);
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-tab').forEach(function(t){ t.classList.remove('active'); });
  btn.classList.add('active');
  renderTable();
}

function renderTable() {
  var now = new Date();
  var todayStr = now.toISOString().split('T')[0];
  var filtered = allBookings.filter(function(b) {
    var d = b.datetime ? new Date(b.datetime) : null;
    if (currentFilter === 'upcoming') return d && d >= now;
    if (currentFilter === 'today') return b.datetime && b.datetime.startsWith(todayStr);
    if (currentFilter === 'past') return d && d < now;
    return true;
  });
  filtered.sort(function(a,b){ return new Date(a.datetime)-new Date(b.datetime); });
  document.getElementById('filter-count').textContent = filtered.length + (filtered.length===1?' appointment':' appointments');
  var tbody = document.getElementById('bookings-tbody');
  if (!filtered.length) {
    tbody.innerHTML = '<tr><td colspan="6"><div class="empty-state"><div class="empty-icon">📅</div><div class="empty-text">No bookings for this period</div></div></td></tr>';
    return;
  }
  tbody.innerHTML = filtered.map(function(b) {
    var d = new Date(b.datetime);
    var dateStr = d.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});
    var timeStr = d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
    var sc = b.status==='confirmed'?'status-confirmed':b.status==='done'?'status-done':'status-pending';
    var sl = b.status==='done'?'Complete':b.status==='confirmed'?'Confirmed':'Pending';
    return '<tr>'
      +'<td class="td-time">'+dateStr+'<br><span style="color:var(--text2);font-size:.65rem">'+timeStr+'</span></td>'
      +'<td class="td-name">'+(b.client_name||b.name||'—')+'</td>'
      +'<td class="td-service">'+(b.service||'—')+'</td>'
      +'<td class="td-service">'+(b.duration?b.duration+' min':'—')+'</td>'
      +'<td class="td-price">£'+(b.price||0)+'</td>'
      +'<td class="td-status"><span class="'+sc+'">'+sl+'</span></td>'
      +'</tr>';
  }).join('');
}
</script>
</body>
</html>
